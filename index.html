<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kerstkaartjes – Brievenbussen</title>
<style>
  :root{
    --green:#2C4A3B;
    --green-dark:#1B2F26;
    --red:#8B1E2B;
    --cream:#FBF7F0;
    --paper:#ffffff;
    --line:#c9c2b4;
    --ink:#26241f;
    --muted:#7a7568;
    --gold:#B08B3E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:"Iowan Old Style","Georgia",serif;
    -webkit-font-smoothing:antialiased;
  }
  .topbar{
    position:sticky; top:0; z-index:20;
    background:var(--green-dark);
    color:#f2ede1;
    padding:14px 18px;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    border-bottom:3px solid var(--gold);
  }
  .topbar h1{
    font-size:1.15rem; margin:0; font-weight:600; letter-spacing:.02em;
    font-family:"Iowan Old Style","Georgia",serif;
  }
  .topbar .sub{font-size:.72rem; color:#cfc7b2; font-family:Arial,sans-serif;}
  .spacer{flex:1;}
  .btn{
    font-family:Arial,sans-serif; font-size:.78rem; font-weight:600;
    padding:8px 14px; border-radius:3px; border:1px solid transparent;
    cursor:pointer; letter-spacing:.02em; transition:opacity .15s;
  }
  .btn:hover{opacity:.85;}
  .btn-gold{background:var(--gold); color:#2b2210;}
  .btn-outline{background:transparent; color:#f2ede1; border-color:#6b7a70;}
  .btn-red{background:var(--red); color:#fff;}
  input[type=file]{display:none;}
  label.filebtn{
    font-family:Arial,sans-serif; font-size:.78rem; font-weight:600;
    padding:8px 14px; border-radius:3px; background:#3d5c4b; color:#f2ede1;
    cursor:pointer; border:1px solid #547061;
  }
  label.filebtn:hover{background:#476856;}

  .wrap{max-width:1400px; margin:0 auto; padding:18px;}

  .banner{
    font-family:Arial,sans-serif; font-size:.85rem;
    background:#fff; border:1px solid var(--gold); border-left:5px solid var(--gold);
    padding:12px 16px; margin-bottom:16px; border-radius:2px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
  }
  .banner.err{border-color:var(--red); border-left-color:var(--red);}
  .banner h3{margin:0 0 6px 0; font-size:.85rem; color:var(--green-dark);}
  .banner ul{margin:4px 0 0 0; padding-left:18px; line-height:1.5;}
  .banner .close{float:right; cursor:pointer; color:var(--muted); font-weight:bold;}

  .review{
    font-family:Arial,sans-serif; font-size:.82rem;
    background:#fff8ee; border:1px solid #e0c28a; border-radius:3px;
    padding:12px 16px; margin-bottom:16px;
  }
  .review h3{margin:0 0 8px 0; color:var(--red); font-size:.85rem;}
  .review .row{display:flex; align-items:center; gap:8px; margin:6px 0; flex-wrap:wrap;}
  .review select, .review input{
    font-family:Arial,sans-serif; font-size:.8rem; padding:4px 6px;
    border:1px solid var(--line); border-radius:2px;
  }

  .arealabel{
    font-size:1.4rem; color:var(--red); margin:26px 0 4px 0;
    border-bottom:2px solid var(--red); padding-bottom:4px;
  }
  .wijk-card{
    position:relative;
    border:2px solid var(--green);
    border-radius:4px;
    padding:18px 16px 10px 16px;
    margin:18px 0 22px 0;
    background:#fffdf8;
    box-shadow:0 1px 4px rgba(44,74,59,.08);
  }
  .wijk-card::before{
    content:'';
    position:absolute; top:0; left:0; right:0; height:5px;
    background:repeating-linear-gradient(135deg, var(--gold) 0 8px, var(--green) 8px 16px);
    border-radius:4px 4px 0 0;
  }
  .subarea{
    display:inline-block; background:var(--green); color:#fff;
    font-family:Arial,sans-serif; font-size:.82rem; font-weight:600;
    padding:5px 12px; border-radius:2px; margin:0 0 10px 0; letter-spacing:.03em;
    position:relative; top:-27px; margin-bottom:-17px;
    box-shadow:0 1px 3px rgba(0,0,0,.15);
  }
  .street-block{
    margin-bottom:14px;
    border:1px solid #cfc7b2;
    border-radius:3px;
    padding:10px 12px 12px 12px;
    background:#fff;
  }
  .street-title{
    font-size:.95rem; color:var(--green-dark); margin:0 0 8px 2px;
    font-family:Arial,sans-serif; font-weight:700;
    display:inline-block; border-bottom:2px solid var(--gold); padding-bottom:2px;
  }
  .street-title .count{color:var(--muted); font-weight:400; font-size:.8rem;}
  .grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(64px,1fr));
    gap:5px; max-width:900px;
  }
  .box{
    border:1px solid #b9b2a0; border-radius:2px; background:#fff;
    text-align:center; padding:5px 2px; cursor:pointer; user-select:none;
    transition:background .1s, color .1s;
    font-family:Arial,sans-serif;
  }
  .box .num{font-size:.82rem; font-weight:700; color:var(--ink); line-height:1.1;}
  .box .wijk{font-size:.62rem; color:var(--red); line-height:1.2;}
  .box.checked{background:var(--green); border-color:var(--green-dark);}
  .box.checked .num{color:#fff;}
  .box.checked .wijk{color:#cfe3d6;}
  body.hide-wijk .box .wijk{display:none;}
  .box.new{outline:2px dashed var(--gold);}

  footer{
    font-family:Arial,sans-serif; font-size:.72rem; color:var(--muted);
    text-align:center; padding:24px 0 60px;
  }

  .log{
    font-family:Arial,sans-serif; font-size:.78rem; background:#fff;
    border:1px solid var(--line); border-radius:3px; padding:10px 14px; margin-bottom:16px;
    max-height:220px; overflow:auto; display:none;
  }
  .log.open{display:block;}
  .log div{padding:2px 0; border-bottom:1px dotted #e5e0d3;}
  .log .stop{color:var(--red);}
  .log .start{color:var(--green);}

  @media print{
    .topbar, .banner, .review, .log, footer{display:none !important;}
    body{background:#fff;}
    .wrap{max-width:none; padding:0 6mm;}
    .arealabel{page-break-before:always; margin-top:0;}
    .wrap > .arealabel:first-of-type{page-break-before:avoid;}
    .wijk-card{page-break-before:always; break-inside:avoid; box-shadow:none;}
    .wrap > .arealabel:first-of-type + .wijk-card,
    .wrap > .wijk-card:first-of-type{page-break-before:avoid;}
    .street-block{break-inside:avoid;}
    .box{border:1px solid #888 !important;}
    .box.checked{background:#ddd !important;}
    .box.checked .num, .box.checked .wijk{color:#000 !important;}
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>🎄 Kerstkaartjes – Brievenbussen</h1>
  <span class="sub" id="statusline">bezig met laden…</span>
  <div class="spacer"></div>
  <label class="filebtn" for="pdfInput">Looplijst PDF inladen</label>
  <input type="file" id="pdfInput" accept="application/pdf">
  <button class="btn btn-outline" id="segBtn">Segmenten: aan</button>
  <button class="btn btn-outline" id="viewBtn">Weergave: per ronde</button>
  <button class="btn btn-outline" id="logBtn">Log</button>
  <button class="btn btn-outline" id="resetBtn">Reset naar basislijst</button>
  <button class="btn btn-gold" id="printBtn">Printen</button>
</div>

<div class="wrap">
  <div id="banners"></div>
  <div id="review" class="review" style="display:none;"></div>
  <div id="log" class="log"></div>
  <div id="content"></div>
  <footer>Kerstkaartjes app · Charlotte Rekers route Oldenzaal · segmentnummer o.b.v. Looplijst Wijken</footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  const raw = localStorage.getItem(LS_DATA);
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return JSON.parse(JSON.stringify(BASE_DATA));
}

function loadChecked(){
  const raw = localStorage.getItem(LS_CHECKED);
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return {};
}
function saveChecked(){ localStorage.setItem(LS_CHECKED, JSON.stringify(CHECKED)); }
function loadLog(){
  const raw = localStorage.getItem(LS_LOG);
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return [];
}
function saveLog(){ localStorage.setItem(LS_LOG, JSON.stringify(LOG.slice(-200))); }

/* ---------- normalisatie (zelfde logica als de PDF-parser) ---------- */
const STREET_ALIASES = {
  'KORTERSTRAAT':'KORTESTRAAT',
  'KORTESTRAAT':'KORTESTRAAT',
  'PLECHELMUSPLEIN':'STPLECHELMUSPLEIN',
  'STPLECHELMUSPLEIN':'STPLECHELMUSPLEIN',
  'WILHEMINASTRAAT':'WILHELMINASTRAAT',
};
function normStreet(s){
  s = s.trim().toUpperCase().replace(/\./g,'').replace(/-/g,'').replace(/\s+/g,'');
  return STREET_ALIASES[s] || s;
}
function normNum(s){
  s = s.toUpperCase().replace(/[^A-Z0-9]/g,'');
  return s.replace('APP','AP');
}
function oostOrWest(wijk){
  const n = parseInt(wijk,10);
  return (n < 300) ? 'Oldenzaal Oost' : 'Oldenzaal-West';
}

/* ---------- straatnaam-index (voor mutatie-parsing) ---------- */
function knownStreets(){
  const set = new Set();
  DATA.forEach(([area,sub,street]) => set.add(street));
  return [...set].sort((a,b) => b.length - a.length);
}

/* ---------- render ---------- */
function keyOf(street, num){
  return normStreet(street) + '|' + normNum(num);
}
function makeBox(num, wijk, street){
  const k = keyOf(street, num);
  const box = document.createElement('div');
  box.className = 'box' + (CHECKED[k] ? ' checked' : '');
  box.innerHTML = '<div class="num">' + num.replace(/\s+/g,'-') + '</div><div class="wijk">' + (wijk||'?') + '</div>';
  box.onclick = () => {
    CHECKED[k] = !CHECKED[k];
    box.classList.toggle('checked');
    saveChecked();
  };
  return box;
}
function makeStreetBlock(street, addrs){
  const block = document.createElement('div');
  block.className = 'street-block';
  const title = document.createElement('div');
  title.className = 'street-title';
  title.innerHTML = street + ' <span class="count">(' + addrs.length + ')</span>';
  block.appendChild(title);
  const grid = document.createElement('div');
  grid.className = 'grid';
  addrs.slice().sort((a,b) => {
    const na = parseInt(a[0],10) || 0, nb = parseInt(b[0],10) || 0;
    return na - nb || a[0].localeCompare(b[0]);
  }).forEach(([num, wijk]) => grid.appendChild(makeBox(num, wijk, street)));
  block.appendChild(grid);
  return block;
}
function makeCard(labelText, labelColorGold){
  const card = document.createElement('div');
  card.className = 'wijk-card';
  const h = document.createElement('div');
  h.className = 'subarea';
  if(labelColorGold){ h.style.background = 'var(--gold)'; h.style.color = '#2b2210'; }
  h.textContent = labelText;
  card.appendChild(h);
  return card;
}

function renderByRonde(content){
  let curArea = null, curSub = undefined, card = null;
  DATA.forEach(([area, sub, street, addrs]) => {
    if(area !== curArea){
      const h = document.createElement('div');
      h.className = 'arealabel';
      h.textContent = area;
      content.appendChild(h);
      curArea = area; curSub = undefined; card = null;
    }
    if(sub !== curSub){
      card = makeCard(sub || 'Nieuw toegevoegd', !sub);
      content.appendChild(card);
      curSub = sub;
    }
    card.appendChild(makeStreetBlock(street, addrs));
  });
}

function groupBySegment(){
  const wijkMap = {};
  DATA.forEach(([area, sub, street, addrs]) => {
    addrs.forEach(([num, wijk]) => {
      const w = wijk || 'onbekend';
      if(!wijkMap[w]) wijkMap[w] = {area, streets: {}};
      if(!wijkMap[w].streets[street]) wijkMap[w].streets[street] = [];
      wijkMap[w].streets[street].push([num, wijk]);
    });
  });
  const keys = Object.keys(wijkMap).sort((a, b) => {
    if(a === 'onbekend') return 1;
    if(b === 'onbekend') return -1;
    return parseInt(a, 10) - parseInt(b, 10);
  });
  return keys.map(w => [w, wijkMap[w]]);
}

function renderBySegment(content){
  const segments = groupBySegment();
  let curArea = null;
  segments.forEach(([wijk, info]) => {
    if(info.area !== curArea){
      const h = document.createElement('div');
      h.className = 'arealabel';
      h.textContent = info.area;
      content.appendChild(h);
      curArea = info.area;
    }
    const total = Object.values(info.streets).reduce((s, a) => s + a.length, 0);
    const label = wijk === 'onbekend' ? 'Onbekend segment' : ('WIJK ' + wijk + ' — ' + total + ' adressen');
    const card = makeCard(label, wijk === 'onbekend');
    content.appendChild(card);
    Object.entries(info.streets).forEach(([street, addrs]) => {
      card.appendChild(makeStreetBlock(street, addrs));
    });
  });
}

let viewMode = localStorage.getItem('kerst_viewmode_v1') || 'ronde';

function render(){
  const content = document.getElementById('content');
  content.innerHTML = '';
  if(viewMode === 'segment'){ renderBySegment(content); }
  else { renderByRonde(content); }
  const total = DATA.reduce((s,e) => s + e[3].length, 0);
  document.getElementById('statusline').textContent = total + ' adressen · ' + DATA.length + ' straten';
}

/* ---------- mutaties toepassen ---------- */
function findEntry(street){
  const sn = normStreet(street);
  for(const e of DATA){
    if(normStreet(e[2]) === sn) return e;
  }
  return null;
}
function removeAddress(street, num){
  const sn = normStreet(street), nn = normNum(num);
  for(const e of DATA){
    if(normStreet(e[2]) !== sn) continue;
    const idx = e[3].findIndex(([n]) => normNum(n) === nn);
    if(idx >= 0){ e[3].splice(idx,1); return true; }
  }
  return false;
}
function addAddress(street, num, wijk){
  const entry = findEntry(street);
  const nn = normNum(num);
  if(entry){
    if(entry[3].some(([n]) => normNum(n) === nn)) return 'dup';
    entry[3].push([num, wijk]);
    return 'added';
  }
  // nieuwe straat: voeg toe aan juiste gebied, geen sub-wijk
  const area = oostOrWest(wijk);
  DATA.push([area, null, street, [[num, wijk]]]);
  return 'added-new-street';
}

function parseMutations(text){
  const results = [];
  const re = /(STOP|START)\s+Abo\s+(.+?),\s*OLDENZAAL/g;
  let m;
  const streets = knownStreets();
  while((m = re.exec(text)) !== null){
    const kind = m[1];
    let chunk = m[2].trim();
    // laatste komma-segment gebruiken (naam ervoor negeren)
    if(chunk.includes(',')){
      const parts = chunk.split(',');
      chunk = parts[parts.length - 1].trim();
    }
    // vind bekende straatnaam als suffix
    let matchedStreet = null, rest = null;
    const chunkNorm = chunk.toUpperCase();
    for(const s of streets){
      const sNorm = s.toUpperCase();
      const idx = chunkNorm.indexOf(sNorm);
      if(idx >= 0){
        matchedStreet = s;
        rest = chunk.slice(idx + s.length).trim();
        break;
      }
    }
    if(!matchedStreet){
      // fallback: laatste woorden vóór het eerste cijfer = straat
      const mm = chunk.match(/^([^\d]+?)\s*([\dA-Za-z][\dA-Za-z .()\-]*)$/);
      if(mm){ matchedStreet = mm[1].trim(); rest = mm[2].trim(); }
      else { continue; }
    }
    if(!rest) continue;
    const numDisplay = rest.replace(/\s+/g,' ').trim();
    results.push({kind, street: matchedStreet, num: numDisplay});
  }
  return results;
}

function applyMutations(muts){
  const applied = {stopped:[], started:[], review:[]};
  muts.forEach(({kind, street, num}) => {
    if(kind === 'STOP'){
      const ok = removeAddress(street, num);
      if(ok){ applied.stopped.push(street + ' ' + num); }
    } else {
      const sn = normStreet(street), nn = normNum(num);
      const wijk = ADDR_TO_WIJK[sn + '|' + nn];
      if(wijk){
        const res = addAddress(street, num, wijk);
        if(res !== 'dup') applied.started.push(street + ' ' + num + ' (wijk ' + wijk + ')');
      } else {
        applied.review.push({street, num});
      }
    }
  });
  return applied;
}

/* ---------- UI: banners, log, review ---------- */
function showBanner(applied){
  const el = document.getElementById('banners');
  const box = document.createElement('div');
  box.className = 'banner';
  let html = '<span class="close" onclick="this.parentElement.remove()">✕</span>';
  html += '<h3>Looplijst verwerkt</h3><ul>';
  html += '<li>' + applied.stopped.length + ' adres(sen) verwijderd (STOP)</li>';
  html += '<li>' + applied.started.length + ' adres(sen) toegevoegd (START)</li>';
  if(applied.review.length){
    html += '<li>' + applied.review.length + ' adres(sen) niet automatisch te koppelen — zie "controleren" hieronder</li>';
  }
  html += '</ul>';
  box.innerHTML = html;
  el.prepend(box);
}
function pushLog(applied){
  const ts = new Date().toLocaleString('nl-NL');
  applied.stopped.forEach(t => LOG.push({ts, kind:'stop', text:t}));
  applied.started.forEach(t => LOG.push({ts, kind:'start', text:t}));
  saveLog();
  renderLog();
}
function renderLog(){
  const el = document.getElementById('log');
  el.innerHTML = LOG.slice().reverse().map(l =>
    '<div class="' + l.kind + '">[' + l.ts + '] ' + (l.kind === 'stop' ? '− ' : '+ ') + l.text + '</div>'
  ).join('') || '<div>Nog geen mutaties toegepast.</div>';
}
function renderReview(){
  const el = document.getElementById('review');
  if(pendingReview.length === 0){ el.style.display = 'none'; el.innerHTML=''; return; }
  el.style.display = 'block';
  el.innerHTML = '<h3>Handmatig koppelen (' + pendingReview.length + ')</h3>' +
    pendingReview.map((r,i) =>
      '<div class="row">' + r.street + ' ' + r.num +
      ' → wijk <input type="text" id="rw' + i + '" size="4" placeholder="bv. 226">' +
      ' <button class="btn btn-gold" onclick="resolveReview(' + i + ')">Toevoegen</button></div>'
    ).join('');
}
function resolveReview(i){
  const r = pendingReview[i];
  const val = document.getElementById('rw' + i).value.trim();
  if(!val){ alert('Vul een wijknummer in.'); return; }
  addAddress(r.street, r.num, val);
  LOG.push({ts:new Date().toLocaleString('nl-NL'), kind:'start', text:r.street + ' ' + r.num + ' (wijk ' + val + ', handmatig)'});
  saveLog(); renderLog();
  pendingReview.splice(i,1);
  renderReview();
  saveData();
  render();
}

/* ---------- PDF inladen ---------- */
document.getElementById('pdfInput').addEventListener('change', async (ev) => {
  const file = ev.target.files[0];
  if(!file) return;
  document.getElementById('statusline').textContent = 'PDF wordt gelezen…';
  try{
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buf}).promise;
    let fullText = '';
    for(let p = 1; p <= pdf.numPages; p++){
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();
      fullText += tc.items.map(it => it.str).join(' ') + ' \n ';
    }
    const muts = parseMutations(fullText);
    if(muts.length === 0){
      const b = document.getElementById('banners');
      const box = document.createElement('div');
      box.className = 'banner err';
      box.innerHTML = '<span class="close" onclick="this.parentElement.remove()">✕</span><h3>Geen mutaties gevonden</h3>Er zijn geen STOP/START-regels herkend in dit PDF-bestand.';
      b.prepend(box);
    } else {
      const applied = applyMutations(muts);
      pendingReview = pendingReview.concat(applied.review);
      saveData();
      showBanner(applied);
      pushLog(applied);
      renderReview();
      render();
    }
  } catch(err){
    console.error(err);
    const b = document.getElementById('banners');
    const box = document.createElement('div');
    box.className = 'banner err';
    box.innerHTML = '<span class="close" onclick="this.parentElement.remove()">✕</span><h3>Fout bij inlezen</h3>' + err.message;
    b.prepend(box);
  }
  ev.target.value = '';
  document.getElementById('statusline').textContent =
    DATA.reduce((s,e) => s + e[3].length, 0) + ' adressen · ' + DATA.length + ' straten';
});

document.getElementById('printBtn').addEventListener('click', () => window.print());
document.getElementById('logBtn').addEventListener('click', () => {
  document.getElementById('log').classList.toggle('open');
});
function applySegVis(visible){
  document.body.classList.toggle('hide-wijk', !visible);
  document.getElementById('segBtn').textContent = 'Segmenten: ' + (visible ? 'aan' : 'uit');
}
let segVisible = localStorage.getItem(LS_SEGVIS);
segVisible = segVisible === null ? true : segVisible === '1';
applySegVis(segVisible);
document.getElementById('segBtn').addEventListener('click', () => {
  segVisible = !segVisible;
  localStorage.setItem(LS_SEGVIS, segVisible ? '1' : '0');
  applySegVis(segVisible);
});
document.getElementById('resetBtn').addEventListener('click', () => {
  if(!confirm('Alles terugzetten naar de oorspronkelijke basislijst? Handmatige mutaties en vinkjes gaan verloren.')) return;
  DATA = JSON.parse(JSON.stringify(BASE_DATA));
  CHECKED = {};
  LOG = [];
  pendingReview = [];
  saveData(); saveChecked(); saveLog();
  renderLog(); renderReview(); render();
});

document.getElementById('viewBtn').addEventListener('click', () => {
  viewMode = (viewMode === 'ronde') ? 'segment' : 'ronde';
  localStorage.setItem('kerst_viewmode_v1', viewMode);
  document.getElementById('viewBtn').textContent = 'Weergave: ' + (viewMode === 'ronde' ? 'per ronde' : 'per segment');
  render();
});
document.getElementById('viewBtn').textContent = 'Weergave: ' + (viewMode === 'ronde' ? 'per ronde' : 'per segment');

renderLog();
renderReview();
render();
</script>
